<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Arrow Industries Campbellfield workshop fabrication">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="60%" stop-color="#0e0e0e"/>
      <stop offset="100%" stop-color="#050505"/>
    </linearGradient>
    <radialGradient id="glow" cx="20%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#e10600" stop-opacity="0.10"/>
      <stop offset="60%" stop-color="#e10600" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1f1f1f" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="800" height="600" fill="url(#g)"/>
  <rect width="800" height="600" fill="url(#grid)"/>
  <rect width="800" height="600" fill="url(#glow)"/>
  <g stroke="#262626" stroke-width="1" fill="none" opacity="0.9">
    <line x1="0" y1="420" x2="800" y2="420"/>
    <line x1="0" y1="440" x2="800" y2="440"/>
  </g>
  <g fill="#1c1c1c">
    <rect x="80" y="340" width="240" height="100"/>
    <rect x="80" y="320" width="40" height="20"/>
    <rect x="280" y="320" width="40" height="20"/>
    <rect x="380" y="360" width="320" height="80"/>
  </g>
  <g fill="#0a0a0a">
    <circle cx="130" cy="445" r="18"/>
    <circle cx="270" cy="445" r="18"/>
    <circle cx="430" cy="445" r="14"/>
    <circle cx="650" cy="445" r="14"/>
  </g>
</svg>
